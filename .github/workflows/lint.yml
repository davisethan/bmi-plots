name: Lint code

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run ruff format check
        run: ruff format --check src
      - name: Run ruff lint
        run: ruff check src
  lint-r:
    runs_on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
      - name: Install dependencies
        run: |
          install.packages(c("styler", "lintr"))
        shell: Rscript {0}
      - name: Run styler check
        run: |
          styler::style_dir("src", dry = "fail")
        shell: Rscript {0}
      - name: Run lintr
        run: |
          lintr::lint_dir("src")
        shell: Rscript {0}
